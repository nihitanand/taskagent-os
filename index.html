<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TaskAgent OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf6ed;color:#2d2013;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#e8d5b0;border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:linear-gradient(135deg,#f9a825,#f57c00);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(245,124,0,0.3)}
#navbar{background:#fff8f0;border-bottom:2px solid #f0dfc0;display:flex;flex-shrink:0;overflow-x:auto}
.nav-btn{flex:1;padding:9px 3px;background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:#b89060;font-size:10px;font-weight:400;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;white-space:nowrap;min-width:48px}
.nav-btn.active{color:#d47c20;border-bottom-color:#f5a623;font-weight:700}
.nav-icon{font-size:16px}
.card{background:#fff;border:1px solid #f0dfc0;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(212,124,32,0.07)}
.stat-card{background:#fff;border:1px solid #f0dfc0;border-radius:10px;padding:12px 10px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.btn-sun{background:linear-gradient(135deg,#f9a825,#f57c00);border:none;color:#fff;padding:9px 18px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.btn-outline{background:transparent;border:1.5px solid #e8cfa0;color:#7a5c3a;padding:7px 14px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-wa{background:linear-gradient(135deg,#25d366,#128c7e);border:none;color:#fff;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-del{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:4px 9px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-gmail{background:linear-gradient(135deg,#ea4335,#c5221f);border:none;color:#fff;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
button:active{transform:scale(.97)}
.inp{width:100%;padding:9px 12px;background:#fffdf9;border:1.5px solid #f0dfc0;border-radius:9px;color:#2d2013;font-size:13px;font-family:inherit;outline:none}
.inp:focus{border-color:#f5a623}
.inp::placeholder{color:#c4a47a}
select.inp option{background:#fff}
/* Task card */
.tc{background:#fff;border:1px solid #f0dfc0;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(212,124,32,0.05)}
.tc-top{display:flex;align-items:flex-start;gap:10px;padding:12px 13px 8px}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #d0c0a0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;cursor:pointer;background:#fff;margin-top:1px}
.chk.done{border-color:#16a34a;background:#f0fdf4;color:#16a34a}
.pri-btns{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.pb{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;font-family:inherit}
.pb-c{background:#fef2f2;color:#991b1b;border-color:#fca5a5}.pb-c.on{background:#dc2626;color:#fff}
.pb-h{background:#fff7ed;color:#c2410c;border-color:#fed7aa}.pb-h.on{background:#ea580c;color:#fff}
.pb-m{background:#fefce8;color:#854d0e;border-color:#fde047}.pb-m.on{background:#ca8a04;color:#fff}
.pb-l{background:#f0fdf4;color:#166534;border-color:#86efac}.pb-l.on{background:#16a34a;color:#fff}
.stabs{display:flex;gap:5px;padding:0 13px 9px;flex-wrap:wrap;align-items:center}
.st{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #e8cfa0;background:#fff;color:#b89060;font-family:inherit}
.st-t{background:#f57c00;color:#fff;border-color:#f57c00}
.st-r{background:#4a9eda;color:#fff;border-color:#4a9eda}
.st-c{background:#7c3aed;color:#fff;border-color:#7c3aed}
.st-x{background:#e5e7eb;color:#6b7280;border-color:#d1d5db;font-size:10px}
.tbar{display:flex;gap:5px;padding:7px 13px 9px;flex-wrap:wrap;align-items:center;border-top:1px solid #f5ecd8}
.tb{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid transparent}
.tb-r{background:#fffbeb;border-color:#fde68a;color:#b45309}
.tb-v{background:#fff8e1;border-color:#fde68a;color:#d97706}
.rmk-section{background:#fffbeb;border-top:1px solid #fde68a;padding:10px 13px}
.ri{background:#fff;border:1px solid #fde68a;border-radius:8px;padding:8px 10px;margin-bottom:6px}
.rd{font-size:11px;font-weight:700;color:#b45309;margin-bottom:3px}
.rts{font-size:10px;color:#d97706;margin-bottom:3px;font-weight:600}
.rt{font-size:13px;color:#78350f;line-height:1.5}
.add-rmk{background:#f0fdf4;border-top:1px solid #86efac;padding:10px 13px}
.due-t{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#fff3e0;color:#e65100;border:1px solid #ffb74d}
.due-r{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.due-c{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#f3e8ff;color:#6d28d9;border:1px solid #c4b5fd}
.due-n{font-size:11px;padding:3px 9px;border-radius:20px;background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb}
.rmk-badge{font-size:10px;background:#fffbeb;color:#b45309;padding:2px 7px;border-radius:4px;border:1px solid #fde68a}
/* Collapsible section header */
.coll-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:#fff8f0;border:1px solid #f0dfc0;border-radius:12px;margin-bottom:8px;cursor:pointer;user-select:none}
.coll-hdr:active{background:#f0e8d8}
.coll-arrow{font-size:12px;color:#b89060;transition:transform .2s}
.coll-arrow.open{transform:rotate(90deg)}
/* Stats */
.bar-bg{height:6px;background:#f5e8d0;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.morning-banner{background:linear-gradient(135deg,#fff8e1,#fff3cd);border:1px solid #fde68a;border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.action-card{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:10px 12px;margin-top:8px}
.ai-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#fff;border:1px solid #d1fae5;border-radius:8px;margin-bottom:5px;cursor:pointer}
.pdf-badge{display:inline-flex;align-items:center;gap:6px;background:#f3e8ff;border:1px solid #c4b5fd;border-radius:8px;padding:5px 10px;font-size:12px;color:#6d28d9;font-weight:600}
#chat-footer{background:#fff8f0;border-top:1.5px solid #f0dfc0;padding:10px 12px;flex-shrink:0;display:none}
#chat-ta{flex:1;padding:9px 12px;background:#fffdf9;border:1.5px solid #f0dfc0;border-radius:12px;color:#2d2013;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.5}
#chat-ta:focus{border-color:#f5a623}
.msg{max-width:85%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#f9a825,#f57c00);color:#fff;border-radius:14px 14px 3px 14px}
.msg.bot{align-self:flex-start;background:#fff;border:1px solid #f0dfc0;border-radius:14px 14px 14px 3px;color:#2d2013;max-width:92%}
.msg.sys{align-self:center;background:#f0fdf4;border:1px solid #86efac;border-radius:10px;color:#166534;font-size:12px;padding:7px 12px;text-align:center;max-width:95%;white-space:normal}
.msg.err{align-self:flex-start;background:#fef2f2;border:1px solid #fca5a5;border-radius:14px 14px 14px 3px;color:#dc2626;font-size:13px;max-width:92%}
#sdot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-left:4px;flex-shrink:0}
#sdot.sy{background:#f59e0b;animation:pulse 1s ease infinite}
#sdot.er{background:#ef4444}
#api-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
#api-modal.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
#loading{position:fixed;inset:0;background:linear-gradient(135deg,#f9a825,#f57c00);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="loading"><div style="font-size:48px;margin-bottom:16px">☀️</div><div style="font-size:20px;font-weight:700;margin-bottom:8px">TaskAgent OS</div><div style="font-size:14px;opacity:.85">Connecting to Firebase...</div></div>
<div id="app" style="display:none">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;background:rgba(255,255,255,0.25);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">☀️</div>
      <div>
        <div style="font-weight:700;font-size:15px;color:#fff;display:flex;align-items:center;gap:5px">TaskAgent OS<span id="sdot"></span></div>
        <div style="font-size:11px;color:rgba(255,255,255,0.85)" id="gsub"></div>
      </div>
    </div>
    <div style="display:flex;gap:5px;align-items:center" id="badges">
      <span style="font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,0.25);color:#fff;border:1px solid rgba(255,255,255,0.4);font-weight:600">🔥 Live</span>
      <button onclick="showApiModal()" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit">🔑 Gemini</button>
    </div>
  </div>
  <div id="navbar">
    <button class="nav-btn active" onclick="setTab('dash',this)"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-btn" onclick="setTab('sheet',this)"><span class="nav-icon">📅</span>Today</button>
    <button class="nav-btn" onclick="setTab('manual',this)"><span class="nav-icon">✏️</span>My Tasks</button>
    <button class="nav-btn" onclick="setTab('all',this)"><span class="nav-icon">📋</span>All Tasks</button>
    <button class="nav-btn" onclick="setTab('wa',this)"><span class="nav-icon">💬</span>WhatsApp</button>
    <button class="nav-btn" onclick="setTab('gmail',this)"><span class="nav-icon">✉️</span>Gmail</button>
    <button class="nav-btn" onclick="setTab('agent',this)"><span class="nav-icon">🤖</span>AI Chat</button>
  </div>
  <div id="content" style="flex:1;overflow-y:auto;padding:14px 12px"></div>
  <div id="chat-footer">
    <div style="display:flex;gap:7px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
      <label style="cursor:pointer"><span style="background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;color:#fff;padding:7px 13px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px">📄 Upload PDF</span><input type="file" id="pdfin" accept=".pdf" style="display:none" onchange="handlePDF(this)"></label>
      <span id="pdf-badge"></span>
      <button id="clear-pdf" onclick="clearPDF()" style="display:none;padding:5px 10px;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit">✕</button>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end">
      <textarea id="chat-ta" placeholder="Ask AI to manage your tasks, add reminders, analyze PDFs..." rows="1" oninput="autoR(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="btn-sun" onclick="sendChat()" style="padding:9px 16px;flex-shrink:0;height:42px">Send ↑</button>
    </div>
    <div style="font-size:11px;color:#c4a47a;margin-top:5px">⚡ Gemini 2.5 Flash for chat · 🧠 Auto-upgrades to 2.5 Pro for PDFs</div>
  </div>
</div>
<div id="api-modal">
  <div class="modal-box">
    <div style="font-size:17px;font-weight:700;color:#78350f;margin-bottom:8px">🔑 Gemini API Key (Free)</div>
    <div style="font-size:13px;color:#7a5c3a;margin-bottom:14px;line-height:1.6">Get a free key at <a href="https://aistudio.google.com" target="_blank" style="color:#d47c20">aistudio.google.com</a> → Get API Key. No credit card needed!</div>
    <input class="inp" id="apikey-inp" type="password" placeholder="AIza..." style="margin-bottom:12px">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-outline" onclick="closeApiModal()">Cancel</button>
      <button class="btn-sun" onclick="saveApiKey()">Save & Connect</button>
    </div>
    <div id="apikey-status" style="margin-top:10px;font-size:12px;text-align:center"></div>
  </div>
</div>

<script>
const FB = "https://taskagent-os-default-rtdb.firebaseio.com";
const PRI = {
  critical:{color:"#dc2626",bg:"#fef2f2",label:"Critical",bd:"#fca5a5"},
  high:    {color:"#c2410c",bg:"#fff7ed",label:"High",    bd:"#fed7aa"},
  medium:  {color:"#ca8a04",bg:"#fefce8",label:"Medium",  bd:"#fde047"},
  low:     {color:"#16a34a",bg:"#f0fdf4",label:"Low",     bd:"#86efac"},
};

// ── STATE ──
let S = {
  tab:"dash", tasks:[], wa:[], emails:[],
  chat:[{r:"a",t:"Good morning! ☀️ I'm your AI Task Agent powered by Gemini (free).\n\n✏️ Type anything to create tasks\n📄 Upload a PDF to extract tasks & WA reminders\n💡 Ask me anything — I can add tasks, set priorities, schedule reminders!\n\nTap 🔑 Gemini to add your free API key."}],
  thinking:false, filterPri:"all",
  showAddTask:false, showAddWa:false,
  remarkingId:null, showRemarksId:null, editingId:null,
  // Collapsible section state — Today tab
  collSheet:{today:false,tomorrow:false,custom:false,done:false,unscheduled:true},
  collAll:{manual:false,gmail:false,wa:false,done:false},
  nT:{title:"",priority:"medium",sched:"none",customDate:""},
  nW:{contact:"",msg:"",time:"",priority:"medium"},
  pdf:null, pdfName:"",
  lastWrite:0,
  // Gmail state
  gmailToken:null, gmailEmails:[], gmailLoading:false, gmailSearch:"", gmailError:""
};

// ── HELPERS ──
function ec(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function tod(){const d=new Date();return`${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getFullYear()}`}
function tsNow(){const n=new Date();const h=n.getHours().toString().padStart(2,'0');const m=n.getMinutes().toString().padStart(2,'0');return`${h}:${m}`}
function dtNow(){return`${tod()} ${tsNow()}`}

// ── DATE HELPERS ──
// Returns today's date as YYYY-MM-DD in IST
function todayIST(){
  const now=new Date();
  // IST = UTC+5:30
  const ist=new Date(now.getTime()+(5.5*60*60*1000));
  return ist.toISOString().split('T')[0];
}
// Returns tomorrow's date as YYYY-MM-DD in IST
function tomorrowIST(){
  const now=new Date();
  const ist=new Date(now.getTime()+(5.5*60*60*1000)+86400000);
  return ist.toISOString().split('T')[0];
}
// Format YYYY-MM-DD to display string
function fmtDate(d){
  if(!d)return'';
  const [y,m,day]=d.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

// ── SMART DATE SHIFT ──
function autoShiftDates(){
  const today=todayIST();
  const tomorrow=tomorrowIST();
  const toWrite=[];
  S.tasks=S.tasks.map(t=>{
    if(t.done)return t;
    let u={...t};
    // tomorrow sched: check if targetDate arrived
    if(u.sched==='tomorrow'&&u.targetDate&&u.targetDate<=today){
      u={...u,sched:'today',targetDate:today};
      toWrite.push(u);
    }
    // custom sched: promote based on date
    if(u.sched==='custom'&&u.customDate){
      if(u.customDate<=today){u={...u,sched:'today',targetDate:today};toWrite.push(u);}
      else if(u.customDate===tomorrow){u={...u,sched:'tomorrow',targetDate:tomorrow};toWrite.push(u);}
    }
    return u;
  });
  // Write all changed tasks to Firebase without triggering poll guard
  toWrite.forEach(t=>{
    dot('sy');
    fetch(`${FB}/tasks/${t.id}.json`,{method:'PUT',body:JSON.stringify(t)})
      .then(()=>dot('')).catch(()=>dot('er'));
  });
  return toWrite.length>0;
}
function greet(){const h=new Date().getHours();return h<12?"Good morning! ☀️":h<17?"Good afternoon! 🌤":"Good evening! 🌅"}
function pt(p){const s=PRI[p]||PRI.medium;return`<span class="tag" style="background:${s.bg};color:${s.color};border:1px solid ${s.bd}">${s.label}</span>`}
function autoR(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px"}
function scr(){setTimeout(()=>document.getElementById("chat-end")?.scrollIntoView({behavior:"smooth"}),80)}
function getApiKey(){return localStorage.getItem('ta_gemini_key')||'';}
function showApiModal(){document.getElementById('apikey-inp').value=getApiKey();document.getElementById('apikey-status').textContent=getApiKey()?'✅ Gemini key is set':'';document.getElementById('api-modal').classList.add('show');}
function closeApiModal(){document.getElementById('api-modal').classList.remove('show');}
function saveApiKey(){const k=document.getElementById('apikey-inp').value.trim();if(!k)return;localStorage.setItem('ta_gemini_key',k);document.getElementById('apikey-status').innerHTML='✅ Saved!';setTimeout(()=>closeApiModal(),900);}
function dot(st){const d=document.getElementById('sdot');if(!d)return;d.className=st;}
function azTasks(arr){return[...arr].sort((a,b)=>a.title.localeCompare(b.title));}
document.getElementById("gsub").textContent=greet();

// ── FIREBASE ──
function fbWrite(path,data){
  S.lastWrite=Date.now();
  dot('sy');
  fetch(`${FB}/${path}.json`,{method:'PUT',body:JSON.stringify(data)})
    .then(r=>{
      if(r.ok){dot('');}
      else{dot('er');}
      S.lastWrite=Date.now(); // Extend guard until confirmed
    })
    .catch(()=>{dot('er');});
}
function fbDel(path){
  S.lastWrite=Date.now();
  dot('sy');
  fetch(`${FB}/${path}.json`,{method:'DELETE'})
    .then(()=>{dot('');S.lastWrite=Date.now();})
    .catch(()=>dot('er'));
}

// ── OPTIMISTIC ACTIONS ──
function upd(id,changes){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  const updated={...t,...changes};
  S.tasks=S.tasks.map(x=>x.id===id?updated:x);
  updateCard(id);fbWrite(`tasks/${id}`,updated);
}
function toggleTask(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;upd(id,{done:!t.done});}
function setPri(id,p){upd(id,{priority:p});}
function setSched(id,s){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  const today=todayIST(),tomorrow=tomorrowIST();
  const changes={sched:s,customDate:s==='custom'?t.customDate:''};
  if(s==='tomorrow') changes.targetDate=tomorrow;
  if(s==='today') changes.targetDate=today;
  if(s==='none') changes.targetDate='';
  const updated={...t,...changes};
  S.tasks=S.tasks.map(x=>x.id===id?updated:x);
  fbWrite(`tasks/${id}`,updated);
  render(); // Full render — task moves between sections
}
function setCDate(id,d){
  if(!d)return;
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  const today=todayIST(),tomorrow=tomorrowIST();
  let newSched='custom';
  if(d<=today) newSched='today';
  else if(d===tomorrow) newSched='tomorrow';
  const updated={...t,customDate:d,sched:newSched,targetDate:newSched==='tomorrow'?tomorrow:newSched==='today'?today:''};
  S.tasks=S.tasks.map(x=>x.id===id?updated:x);
  fbWrite(`tasks/${id}`,updated);
  render(); // Full render needed — task moves between sections
}
function delTask(id){if(!confirm("Delete this task?"))return;S.tasks=S.tasks.filter(t=>t.id!==id);document.getElementById(`tc-${id}`)?.remove();fbDel(`tasks/${id}`);updateStats();}

// ── MULTI-REMARK WITH TIMESTAMP ──
function svRmk(id){
  const txt=document.getElementById(`rmk-${id}`)?.value?.trim();if(!txt)return alert("Enter a remark");
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  // Each remark has unique id, date, time, text — multiple per day allowed
  const newRmk={id:Date.now(),date:tod(),time:tsNow(),dt:dtNow(),text:txt};
  const remarks=[...(t.remarks||[]),newRmk];
  const updated={...t,remarks};
  S.tasks=S.tasks.map(x=>x.id===id?updated:x);
  S.remarkingId=null;S.showRemarksId=id;
  updateCard(id);fbWrite(`tasks/${id}`,updated);
}
function delRmk(tid,rmkId){
  const t=S.tasks.find(x=>x.id===tid);if(!t)return;
  upd(tid,{remarks:(t.remarks||[]).filter(r=>r.id!==rmkId)});
}

function saveEdit(id){
  const title=document.getElementById(`ed-title-${id}`)?.value?.trim();
  if(!title)return alert("Title cannot be empty");
  upd(id,{title});
  S.editingId=null;
}
function addTask(){
  const title=document.getElementById("nt-t")?.value?.trim()||S.nT.title;
  if(!title)return alert("Enter a title");
  const id=Date.now();
  const newT={id,title,priority:S.nT.priority,source:"manual",sched:S.nT.sched,customDate:S.nT.customDate||"",done:false,remarks:[]};
  S.tasks=[...S.tasks,newT];S.nT={title:"",priority:"medium",sched:"none",customDate:""};S.showAddTask=false;
  render();fbWrite(`tasks/${id}`,newT);
}
function addWa(){
  const contact=document.getElementById("wa-c")?.value?.trim();
  const msg=document.getElementById("wa-m")?.value?.trim();
  const time=document.getElementById("wa-t")?.value?.trim();
  const priority=document.getElementById("wa-p")?.value||"medium";
  if(!contact||!msg)return alert("Contact and message required");
  const id=Date.now();
  const newW={id,contact,msg,time:time||"Soon",sent:false,priority};
  S.wa=[...S.wa,newW];S.showAddWa=false;render();fbWrite(`wa/${id}`,newW);
}
function mkSent(id){const w=S.wa.find(x=>x.id===id);if(!w)return;const u={...w,sent:true};S.wa=S.wa.map(x=>x.id===id?u:x);render();fbWrite(`wa/${id}`,u);}
function dlWa(id){S.wa=S.wa.filter(w=>w.id!==id);render();fbDel(`wa/${id}`);}

// ── TARGETED CARD UPDATE ──
function updateCard(id){
  const el=document.getElementById(`tc-${id}`);if(!el)return;
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  el.outerHTML=tCard(t);updateStats();
}
function updateStats(){
  const pnd=S.tasks.filter(t=>!t.done);const cr=pnd.filter(t=>t.priority==="critical").length;
  let cb=document.getElementById("cb");
  if(cr>0){if(!cb){cb=document.createElement("span");cb.id="cb";cb.style.cssText="font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,0.25);color:#fff;border:1px solid rgba(255,255,255,0.4);font-weight:600";document.getElementById("badges").insertBefore(cb,document.querySelector('#badges button'));}cb.textContent=`🔴 ${cr}`;}else if(cb)cb.remove();
}

// ── TAB NAVIGATION ──
function setTab(t,btn){S.tab=t;document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));if(btn)btn.classList.add("active");document.getElementById("chat-footer").style.display=t==="agent"?"block":"none";render();if(t==="agent")scr();}
function navTo(t,i){S.tab=t;document.querySelectorAll(".nav-btn").forEach((b,j)=>b.classList.toggle("active",j===i));document.getElementById("chat-footer").style.display=t==="agent"?"block":"none";render();if(t==="agent")scr();}

// ── RENDER ──
function render(){
  const pnd=S.tasks.filter(t=>!t.done);const cr=pnd.filter(t=>t.priority==="critical").length;
  let cb=document.getElementById("cb");
  if(cr>0){if(!cb){cb=document.createElement("span");cb.id="cb";cb.style.cssText="font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,0.25);color:#fff;border:1px solid rgba(255,255,255,0.4);font-weight:600";document.getElementById("badges").insertBefore(cb,document.querySelector('#badges button'));}cb.textContent=`🔴 ${cr}`;}else if(cb)cb.remove();
  const c=document.getElementById("content");
  if(S.tab==="dash")    rDash(c,pnd,cr);
  else if(S.tab==="sheet")  rSheet(c);
  else if(S.tab==="manual") rManual(c);
  else if(S.tab==="all")    rAll(c);
  else if(S.tab==="wa")     rWa(c);
  else if(S.tab==="gmail")  rGmail(c);
  else if(S.tab==="agent")  rAgent(c);
}

// ── DUE LABEL ──
function dueLabel(t){
  if(t.sched==="today")return`<span class="due-t">📅 Today</span>`;
  if(t.sched==="tomorrow")return`<span class="due-r">📅 Tomorrow</span>`;
  if(t.sched==="custom"&&t.customDate)return`<span class="due-c">📅 ${ec(t.customDate)}</span>`;
  return`<span class="due-n">Unscheduled</span>`;
}

// ── TASK CARD ──
function tCard(t){
  const ie=S.editingId===t.id;
  const ir=S.remarkingId===t.id,sr=S.showRemarksId===t.id;
  const remarks=t.remarks||[];const hr=remarks.length>0;
  const priRow=["critical","high","medium","low"].map(p=>{
    const cls={critical:"pb-c",high:"pb-h",medium:"pb-m",low:"pb-l"}[p];
    return`<button class="pb ${cls} ${t.priority===p?'on':''}" onclick="setPri(${t.id},'${p}')">${PRI[p].label}</button>`;
  }).join("");
  const schedRow=`
    <button class="st ${t.sched==='today'?'st-t':''}" onclick="setSched(${t.id},'today')">📅 Today</button>

    <button class="st ${t.sched==='custom'?'st-c':''}" onclick="setSched(${t.id},'custom')">🗓 Custom</button>
    ${t.sched!=='none'?`<button class="st st-x" onclick="setSched(${t.id},'none')">✕ Clear</button>`:''}
    ${t.sched==='custom'?`<input type="date" value="${ec(t.customDate||'')}" onchange="setCDate(${t.id},this.value)" style="padding:4px 8px;border-radius:8px;border:1.5px solid #c4b5fd;font-size:11px;color:#2d2013;font-family:inherit;outline:none;background:#faf5ff;width:130px">`:''}`;

  const rmksHtml=sr&&hr?`<div class="rmk-section">

    ${[...remarks].reverse().map(r=>`<div class="ri">
      <div class="rd">📌 ${ec(r.date||'')} <span class="rts">⏰ ${ec(r.time||r.dt||'')}</span></div>
      <div class="rt">${ec(r.text)}</div>
      <div style="text-align:right;margin-top:5px"><button class="btn-del" onclick="delRmk(${t.id},${r.id||0})">🗑</button></div>

  const addRmk=ir?`<div class="add-rmk">
    <div style="font-size:12px;font-weight:700;color:#166534;margin-bottom:6px">📝 Add Progress Note — ${tod()} ${tsNow()}</div>
    <textarea class="inp" id="rmk-${t.id}" placeholder="What happened? Any update or progress..." rows="2" style="resize:vertical;margin-bottom:8px"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-outline" style="padding:5px 12px;font-size:12px" onclick="S.remarkingId=null;updateCard(${t.id})">Cancel</button>
      <button style="padding:5px 14px;background:#16a34a;border:none;color:#fff;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer" onclick="svRmk(${t.id})">💾 Save Note</button>
    </div>
  </div>`:"";
  const editForm=ie?`<div style="background:#eff6ff;border-top:1px solid #93c5fd;padding:10px 13px">
    <div style="font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:8px">✏️ Edit Task</div>
    <input class="inp" id="ed-title-${t.id}" value="${ec(t.title)}" placeholder="Task title..." style="margin-bottom:8px;border-color:#93c5fd">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-outline" style="padding:5px 12px;font-size:12px" onclick="S.editingId=null;updateCard(${t.id})">Cancel</button>
      <button style="padding:5px 14px;background:#1d4ed8;border:none;color:#fff;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer" onclick="saveEdit(${t.id})">💾 Save</button>
    </div>
  </div>`:"";
  return`<div class="tc" id="tc-${t.id}" style="opacity:${t.done?0.6:1}">
    <div class="tc-top">
      <div class="chk ${t.done?'done':''}" onclick="toggleTask(${t.id})" style="border-color:${t.done?'#16a34a':PRI[t.priority]?.color||'#d0c0a0'}">${t.done?"✓":""}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;margin-bottom:7px;text-decoration:${t.done?'line-through':'none'};color:${t.done?'#b89060':'#2d2013'};line-height:1.4">${ec(t.title)}</div>
        <div class="pri-btns">${priRow}</div>

// ── COLLAPSIBLE SECTION HEADER ──
function collHdr(label,count,key,stateObj,color,bg){
  const open=!!stateObj[key];
  const isSheet=stateObj===S.collSheet;
  return`<div class="coll-hdr" onclick="toggle_coll('${isSheet?'sheet':'all'}','${key}')">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:14px;font-weight:700;color:${color}">${label}</span>
      <span style="background:${bg};color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700">${count}</span>
    </div>
    <span style="font-size:12px;color:#b89060;transition:transform .2s;display:inline-block;transform:rotate(${open?90:0}deg)">▶</span>
  </div>`;
}
function toggle_coll(which,key){
  if(which==='sheet')S.collSheet[key]=!S.collSheet[key];
  else S.collAll[key]=!S.collAll[key];
  render();
}

// ── TODAY SHEET — collapsible sections ──
function rSheet(c){

  const sections=[
    ["today","📅 Today","#e65100","#f57c00"],
    ["tomorrow","⏭ Tomorrow","#1565c0","#4a9eda"],
    ["custom","🗓 Scheduled","#6d28d9","#7c3aed"]
  ];
  const today=todayIST();
  let html=`<div style="background:linear-gradient(135deg,#fff8e1,#fff3cd);border:1px solid #fde68a;border-radius:12px;padding:12px 14px;margin-bottom:12px">
    <div style="font-size:16px;font-weight:700;color:#78350f">📅 Daily Task Sheet</div>
    <div style="font-size:12px;color:#a16207;margin-top:2px">${tod()} · Auto-shifts dates at midnight IST · Tap to collapse</div>
  </div>`;
  let any=false;
  sections.forEach(([s,lbl,col,bg])=>{
    const ts=azTasks(S.tasks.filter(t=>t.sched===s&&!t.done&&(s!=='custom'||true)));
    if(!ts.length)return;any=true;
    html+=collHdr(lbl,ts.length,s,S.collSheet,col,bg);
    if(S.collSheet[s])html+=`<div style="margin-bottom:12px">${ts.map(t=>tCard(t)).join("")}</div>`;
  });

  // Unscheduled section
  const unsch=azTasks(S.tasks.filter(t=>t.sched==='none'&&!t.done));
  if(unsch.length){
    any=true;
    html+=collHdr("⏳ Unscheduled",unsch.length,"unscheduled",S.collSheet,"#6b7280","#9ca3af");
    if(S.collSheet.unscheduled)html+=`<div style="margin-bottom:12px">${unsch.map(t=>`
      <div style="background:#fff;border:1px solid #f0dfc0;border-radius:12px;margin-bottom:8px;overflow:hidden">
        <div style="display:flex;align-items:center;gap:10px;padding:11px 13px">
          <div class="chk" onclick="toggleTask(${t.id})" style="border-color:${PRI[t.priority]?.color||'#d0c0a0'}">${t.done?"✓":""}</div>
          <div style="flex:1;font-size:14px;font-weight:600;color:#2d2013;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ec(t.title)}</div>
          ${pt(t.priority)}
        </div>
        <div style="display:flex;gap:5px;padding:0 13px 10px;flex-wrap:wrap">
          <button class="st st-t" onclick="setSched(${t.id},'today')">📅 Today</button>
          <button class="st st-r" onclick="setSched(${t.id},'tomorrow')">⏭ Tomorrow</button>
          <button class="st st-c" onclick="setSched(${t.id},'custom')">🗓 Custom</button>
        </div>
      </div>`).join("")}</div>`;
  }

  if(!any)html+=`<div class="card" style="text-align:center;padding:40px"><div style="font-size:36px;margin-bottom:12px">📋</div><div style="font-weight:600;color:#78350f;margin-bottom:7px">No tasks yet</div><button class="btn-sun" onclick="navTo('manual',2)">✏️ Go to My Tasks</button></div>`;

  // Done section — collapsible
  const done=azTasks(S.tasks.filter(t=>t.done));
  if(done.length){
    html+=collHdr("✅ Completed",done.length,"done",S.collSheet,"#16a34a","#16a34a");
    if(S.collSheet.done)html+=`<div style="margin-bottom:12px">${done.map(t=>tCard(t)).join("")}</div>`;
  }
  c.innerHTML=html;
}

// Handle OAuth redirect
(function(){
  const hash=window.location.hash;
  if(hash.includes('access_token')){
    const p=new URLSearchParams(hash.slice(1));
    const token=p.get('access_token');
    if(token){S.gmailToken=token;localStorage.setItem('ta_gmail_token',token);window.history.replaceState(null,'',window.location.pathname);setTimeout(()=>loadGmail(),300);}
  }else{
    const saved=localStorage.getItem('ta_gmail_token');
    if(saved)S.gmailToken=saved;
  }
})();

function loadGmail(){
  if(!S.gmailToken){render();return;}
  S.gmailLoading=true;S.gmailError="";render();
  fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=20&q=in:inbox',{headers:{Authorization:`Bearer ${S.gmailToken}`}})
    .then(r=>{
      if(r.status===401){S.gmailToken=null;localStorage.removeItem('ta_gmail_token');S.gmailLoading=false;S.gmailError="Session expired — please sign in again.";render();return null;}
      if(!r.ok){return r.json().then(e=>{S.gmailLoading=false;S.gmailError="Gmail error: "+(e.error?.message||r.status);render();return null;});}
      return r.json();
    })
    .then(data=>{
      if(!data)return;
      if(!data.messages){S.gmailEmails=[];S.gmailLoading=false;render();return;}
      const ids=data.messages.map(m=>m.id);
      return Promise.all(ids.map(id=>fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`,{headers:{Authorization:`Bearer ${S.gmailToken}`}}).then(r=>r.json())));
    })
    .then(msgs=>{
      if(!msgs)return;
      S.gmailEmails=msgs.filter(m=>m&&m.payload).map(m=>{
        const hdrs=m.payload?.headers||[];
        const hdr=n=>hdrs.find(h=>h.name===n)?.value||'';
        const from=hdr('From').replace(/<[^>]*>/g,'').trim()||'Unknown';
        return{id:m.id,from,subject:hdr('Subject')||'(No subject)',date:hdr('Date').substring(0,16),snippet:m.snippet||'',isUnread:(m.labelIds||[]).includes('UNREAD')};
      });
      S.gmailLoading=false;render();
    })
    .catch(err=>{S.gmailLoading=false;S.gmailError='Load failed: '+err.message;render();});
}

  if(!S.gmailToken||!S.gmailSearch.trim())return;

function clearPDF(){S.pdf=null;S.pdfName="";document.getElementById("pdf-badge").innerHTML="";document.getElementById("clear-pdf").style.display="none";document.getElementById("chat-ta").placeholder="Ask AI to manage your tasks, add reminders, analyze PDFs...";}
function qs(t){document.getElementById("chat-ta").value=t;sendChat();}

// ── GEMINI API — smart model selection ──
async function callGemini(prompt, pdfData){
  const key=getApiKey();if(!key)throw new Error('NO_KEY');
  // Use Pro for PDFs (complex analysis), Flash for regular chat (fast & cheap)
  const model=pdfData?'gemini-2.5-pro':'gemini-2.5-flash';
  const parts=pdfData?[{inline_data:{mime_type:"application/pdf",data:pdfData}},{text:prompt}]:[{text:prompt}];
  const body={contents:[{parts}],generationConfig:{maxOutputTokens:1500,temperature:0.7}};
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||'Gemini error');
  return data.candidates?.[0]?.content?.parts?.[0]?.text||"Sorry, no response.";
}

async function sendChat(){
  const ta=document.getElementById("chat-ta");const txt=(ta?.value||"").trim();const hasPDF=!!S.pdf;
  if(!txt&&!hasPDF)return;if(S.thinking)return;
  if(!getApiKey()){showApiModal();return;}
  if(ta){ta.value="";ta.style.height="auto";}
  S.chat=[...S.chat,{r:hasPDF?"pdf":"u",t:hasPDF?`📄 ${S.pdfName}${txt?" — "+txt:""}`:txt}];
  S.thinking=true;render();scr();
  const pnd=S.tasks.filter(t=>!t.done);
  const sys=`You are TaskAgent OS — an AI assistant managing tasks and reminders. Today: ${tod()} ${tsNow()}.
Current tasks (${pnd.length} pending): ${JSON.stringify(pnd.slice(0,8).map(t=>({id:t.id,title:t.title,priority:t.priority,sched:t.sched})))}
WA reminders pending: ${S.wa.filter(w=>!w.sent).length}

You can help the user:
- Create tasks, set priorities, schedule them
- Answer questions about their tasks
- Extract tasks from free text or PDFs
- Draft messages and emails

WHEN USER TYPES FREE TEXT WITH TASKS/MEETINGS: extract and append JSON:
\`\`\`json
[{"type":"task","title":"...","priority":"critical|high|medium|low"},{"type":"wa","contact":"...","message":"...","priority":"..."}]
\`\`\`
WHEN PDF UPLOADED: analyze fully, extract all action items, deadlines. Return comprehensive JSON.
For normal questions: respond conversationally, max 150 words, use bullet points.`;

  try{
    const pdfD=hasPDF?S.pdf:null;
    if(hasPDF)clearPDF();
    const prompt=`${sys}\n\nUser: ${txt||"Analyze the uploaded PDF and extract all tasks, action items, and reminders."}`;
    let rep=await callGemini(prompt,pdfD);
    let acts=null;
    const jm=rep.match(/```json\s*([\s\S]*?)```/);
    if(jm){try{const p=JSON.parse(jm[1].trim());if(Array.isArray(p)&&p.length)acts=p;}catch(ex){}rep=rep.replace(/```json[\s\S]*?```/g,"").trim();}
    S.chat=[...S.chat,{r:"a",t:rep,acts}];
  }catch(ex){
    S.chat=[...S.chat,{r:"err",t:ex.message==="NO_KEY"?"Gemini API key not set. Tap 🔑 Gemini to add your free key.":"Gemini error: "+ex.message}];
  }
  S.thinking=false;render();scr();
}

// ── FIREBASE POLLING ──
let lastTasksJSON="",lastWaJSON="",shiftDone=false;

function pollFirebase(){
  // Don't poll right after a user action (4s grace)
  if(Date.now()-S.lastWrite<4000)return;
  
  fetch(`${FB}/tasks.json`).then(r=>r.json()).then(data=>{
    if(!data){S.tasks=[];dot('');render();return;}
    const incoming=Object.values(data);
    const j=JSON.stringify(incoming.map(t=>t.id+'|'+t.sched+'|'+t.customDate+'|'+t.targetDate+'|'+t.done).sort().join());
    if(j===lastTasksJSON)return; // No change
    lastTasksJSON=j;
    S.tasks=incoming;
    
    // Run date shift ONCE after first load, then on each change
    const today=todayIST(),tomorrow=tomorrowIST();
    let shifted=false;
    S.tasks=S.tasks.map(t=>{
      if(t.done)return t;
      let u={...t};
      if(u.sched==='custom'&&u.customDate){
        if(u.customDate<=today){u={...u,sched:'today',targetDate:today};shifted=true;}
        else if(u.customDate===tomorrow){u={...u,sched:'tomorrow',targetDate:tomorrow};shifted=true;}
      }
      if(u.sched==='tomorrow'&&u.targetDate&&u.targetDate<=today){
        u={...u,sched:'today',targetDate:today};shifted=true;
      }
      return u;
    });
    
    if(shifted){
      // Write shifted tasks back without triggering lastWrite guard
      S.tasks.forEach(t=>{
        const orig=incoming.find(x=>x.id===t.id);
        if(orig&&orig.sched!==t.sched){
          fetch(`${FB}/tasks/${t.id}.json`,{method:'PUT',body:JSON.stringify(t)});
        }
      });
      lastTasksJSON=""; // Force re-read on next poll
    }
    
    dot('');render();
  }).catch(()=>dot('er'));
  
  fetch(`${FB}/wa.json`).then(r=>r.json()).then(data=>{
    const j=JSON.stringify(data);if(j===lastWaJSON)return;lastWaJSON=j;
    S.wa=data?Object.values(data):[];if(S.tab==="wa")render();
  }).catch(()=>{});
}

// Initial load then poll every 5s
pollFirebase();
setInterval(pollFirebase,5000);

// Show app
document.getElementById('loading').style.display='none';
document.getElementById('app').style.display='flex';
if(S.gmailToken)setTimeout(()=>loadGmail(),500);
render();
